#VRML_SIM R2023b utf8
# LGDXRobot2 Concept
EXTERNPROTO "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/appearances/protos/Plastic.proto"
EXTERNPROTO "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/appearances/protos/Rubber.proto"
EXTERNPROTO "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/appearances/protos/BrushedAluminium.proto"
EXTERNPROTO "https://raw.githubusercontent.com/cyberbotics/webots/R2025a/projects/appearances/protos/Pcb.proto"
PROTO LGDXRobot2 [
  field SFVec3f    translation  0 0 0
  field SFRotation rotation     0 0 1 0
  field SFString   controller   ""
  field SFString   name         ""
]
{
Robot {
  translation IS translation
  rotation IS rotation
  name IS name
  controller IS controller
  children [
    Gyro {
      translation -0.083513 0 0.0649
    }
    InertialUnit {
      translation -0.083513 0 0.0649
      name "inertial_unit"
    }
    Accelerometer {
      translation -0.083513 0 0.0649
    }
    Solid {
      translation 0.06 0 0.13331
      rotation 0 0 1 3.14159
      children [
        Shape {
          appearance Plastic {
            colorOverride 0 0 0
          }
          geometry Mesh {
            url [
              "meshes/Lidar.dae"
            ]
          }
        }
        Lidar {
          translation 0 0 0.0231
          name "lidar_link"
          horizontalResolution 500
          fieldOfView 6.28318
          numberOfLayers 1
          near 0.05
          minRange 0.05
          maxRange 6
        }
      ]
      name "lidar"
      boundingObject Pose {
        translation 0 0 0.02065
        children [
          Box {
            size 0.0556 0.0556 0.0413
          }
        ]
      }
      physics Physics {
        density -1
        mass 0.11
      }
    }
    Solid {
      translation 0.106 0 0.05931
      children [
        RangeFinder {
          translation 0.025 0.0175 0.0125
          name "camera_depth_frame_sim"
          width 1280
          height 720
          minRange 0.3
          maxRange 3
        }
        Camera {
          translation 0.025 0.0325 0.0125
          name "camera_color_frame_sim"
          width 1280
          height 720
        }
        Pose {
          translation 0 0 0.0125
          children [
            Shape {
              appearance BrushedAluminium {
              }
              geometry Mesh {
                url [
                  "meshes/Camera.dae"
                ]
              }
            }
          ]
        }
      ]
      name "camera"
      boundingObject Pose {
        translation 0.0125 0 0.0125
        children [
          DEF CAMERA_BO Box {
            size 0.025 0.09 0.025
          }
        ]
      }
      physics Physics {
        density -1
        mass 0.26
      }
    }
    HingeJoint {
      jointParameters HingeJointParameters {
        axis 0 1 0
        anchor 0 0.10357 0.037
      }
      device [
        RotationalMotor {
          name "wheel_left"
        }
        PositionSensor {
          name "encoder_left"
        }
      ]
      endPoint Solid {
        translation 0 0.10357 0.037
        rotation 1 0 0 1.5708
        children [
          Shape {
            appearance Rubber {
            }
            geometry Cylinder {
              height 0.026
              radius 0.0375
            }
          }
        ]
        name "WHEEL_LEFT"
        boundingObject Cylinder {
          height 0.026
          radius 0.0375
        }
        physics Physics {
          density -1
          mass 0.1018
          centerOfMass [ 0 0 0 ]
        }
      }
    }

    HingeJoint {
      jointParameters HingeJointParameters {
        axis 0 1 0
        anchor 0 -0.10357 0.037
      }
      device [
        RotationalMotor {
          name "wheel_right"
        }
        PositionSensor {
          name "encoder_right"
        }
      ]
      endPoint Solid {
        translation 0 -0.10357 0.037
        rotation 1 0 0 1.5708
        children [
          Shape {
            appearance Rubber {
            }
            geometry Cylinder {
              height 0.026
              radius 0.0375
            }
          }
        ]
        name "WHEEL_RIGHT"
        boundingObject Cylinder {
          height 0.026
          radius 0.0375
        }
        physics Physics {
          density -1
          mass 0.1018
          centerOfMass [ 0 0 0 ]
        }
      }
    }

    # Roue folle avant (sphère, joint fixe = pas de HingeJoint)
    Solid {
      translation 0.082 0 0.037
      children [
        Shape {
          appearance Rubber {
          }
          geometry Sphere {
            radius 0.0375
          }
        }
      ]
      name "CASTER_FRONT"
      boundingObject Sphere {
        radius 0.0375
      }
      physics Physics {
        density -1
        mass 0.01
        coulombFriction [ 0 ]  # friction nulle pour glissement libre
      }
    }

    # Roue folle arrière
    Solid {
      translation -0.082 0 0.037
      children [
        Shape {
          appearance Rubber {
          }
          geometry Sphere {
            radius 0.0375
          }
        }
      ]
      name "CASTER_BACK"
      boundingObject Sphere {
        radius 0.0375
      }
      physics Physics {
        density -1
        mass 0.01
        coulombFriction [ 0 ]
      }
    }
    DEF BODY Pose {
      children [
        Shape {
          appearance Pcb {
          }
          geometry Mesh {
            url [
              "meshes/Board.dae"
            ]
          }
        }
        DEF BOARD_SCREWS Shape {
          appearance BrushedAluminium {
          }
          geometry Mesh {
            url [
              "meshes/Screws.dae"
            ]
          }
        }
        DEF MOTORS Shape {
          appearance BrushedAluminium {
            IBLStrength 0.5
          }
          geometry Mesh {
            url [
              "meshes/Motors.dae"
            ]
          }
        }
        DEF BRACKETS Shape {
          appearance BrushedAluminium {
            colorOverride 0 0 0
          }
          geometry Mesh {
            url [
              "meshes/Brackets.dae"
            ]
          }
        }
        DEF STANDOFFS Shape {
          appearance BrushedAluminium {
            IBLStrength 0.5
          }
          geometry Mesh {
            url [
              "meshes/Standoffs.dae"
            ]
          }
        }
        DEF PLATES Shape {
          appearance Plastic {
            colorOverride 0.509804 0.105882 0.113725
          }
          geometry Mesh {
            url [
              "meshes/Plates.dae"
            ]
          }
        }
      ]
    }
  ]
  boundingObject Group {
    children [
      Pose {
        translation 0 0 0.031
        children [
          Box {
            size 0.204 0.138 0.047
          }
        ]
      }
      Pose {
        translation 0 0 0.094
        children [
          Box {
            size 0.24 0.24 0.078
          }
        ]
      }
    ]
  }
  physics Physics {
    density -1
    mass 2
  }
}

}